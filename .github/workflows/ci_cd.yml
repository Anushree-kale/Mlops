name: ML CI/CD Pipeline

on:
  push:
    branches:
      - main   # triggers on every push

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    # ── Step 1: Checkout Code ─────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v3

    # ── Step 2: Setup Python ──────────────────────────
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # ── Step 3: Install Dependencies ──────────────────
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # ── Step 4: Run Training Script ───────────────────
    - name: Train Model
      run: python main.py

    # ── Step 5: Run Tests ─────────────────────────────
    - name: Run Tests
      run: python test_model.py

    # ── Step 6: Build Docker Image ────────────────────
    - name: Build Docker Image
      run: docker build -t iris-ml-model:latest .
      
    # ── Step 7: Upload Model Artifacts ────────────────
    - name: Upload Training Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: trained-models
        path: |
          model_v*.pkl
          experiment_runs.csv

    # ── Step 8: Simulated Deployment ──────────────────
    - name: Deploy (Test Environment)
      run: echo "Model deployed successfully to testing environment!"